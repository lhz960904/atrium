<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atrium · Architecture (Excalidraw style)</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'Virgil';
    src: url('https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw-assets/Virgil.woff2') format('woff2');
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; padding: 30px; }
  .wrap { width: 1000px; margin: 0 auto; }
  svg { display: block; width: 100%; height: auto; }
  text { font-family: 'Virgil', 'Patrick Hand', cursive; }
</style>
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
</head>
<body>
<div class="wrap">
  <svg id="svg" viewBox="0 0 1000 1040" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<script>
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');
  const rc = rough.svg(svg);
  const G = document.createElementNS(NS, 'g');
  G.setAttribute('transform', 'translate(0,60)');
  svg.appendChild(G);

  let SEED = 1;
  function band(x, y, w, h, stroke, fill, dash) {
    const o = { seed: SEED++, roughness: 1.6, bowing: 1, strokeWidth: 2.5, stroke,
      fill, fillStyle: 'hachure', hachureGap: 9, fillWeight: 1.1 };
    if (dash) o.strokeLineDash = [10, 7];
    G.appendChild(rc.rectangle(x, y, w, h, o));
  }
  function chip(x, y, w, h) {
    G.appendChild(rc.rectangle(x, y, w, h,
      { seed: SEED++, roughness: 1.1, bowing: 1, strokeWidth: 1.6, stroke: '#1e1e1e',
        fill: '#ffffff', fillStyle: 'solid' }));
  }
  function group(x, y, w, h, stroke) {
    G.appendChild(rc.rectangle(x, y, w, h,
      { seed: SEED++, roughness: 1.5, strokeWidth: 1.2, stroke, fill: '#ebfbee',
        fillStyle: 'hachure', hachureGap: 7, fillWeight: 0.8, strokeLineDash: [6, 6] }));
  }
  function T(x, y, s, size, fill, anchor) {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('font-size', size); t.setAttribute('fill', fill || '#1e1e1e');
    t.setAttribute('text-anchor', anchor || 'middle');
    t.textContent = s; G.appendChild(t); return t;
  }
  function svgT(x, y, s, size, fill, anchor) { // appended to root (no translate) — for title
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('font-size', size); t.setAttribute('fill', fill || '#1e1e1e');
    t.setAttribute('text-anchor', anchor || 'start');
    t.textContent = s; svg.appendChild(t);
  }
  function arrowDown(x, y1, y2, label) {
    G.appendChild(rc.line(x, y1, x, y2, { seed: SEED++, stroke: '#495057', strokeWidth: 1.6, roughness: 1 }));
    G.appendChild(rc.line(x - 6, y2 - 9, x, y2, { seed: SEED++, stroke: '#495057', strokeWidth: 1.6, roughness: 1 }));
    G.appendChild(rc.line(x + 6, y2 - 9, x, y2, { seed: SEED++, stroke: '#495057', strokeWidth: 1.6, roughness: 1 }));
    if (label) T(x + 12, (y1 + y2) / 2 + 4, label, 12, '#868e96', 'start');
  }

  // ===== Title (outside the translated group) =====
  svgT(70, 44, 'Atrium · Architecture', 30, '#1e1e1e', 'start');
  svgT(70, 76, 'Layered overview — Electron desktop AI workspace', 14, '#868e96', 'start');

  // ===== arrows (draw under boxes) =====
  arrowDown(500, 150, 191, 'IPC · HTTP');
  arrowDown(500, 306, 347, 'dispatch');
  arrowDown(500, 582, 623, 'persist · read');
  // external model-call path: main → providers, bypassing storage (left margin)
  const oarr = { seed: SEED++, stroke: '#e8590c', strokeWidth: 1.8, roughness: 1, strokeLineDash: [7, 5] };
  G.appendChild(rc.line(50, 545, 30, 545, oarr));
  G.appendChild(rc.line(30, 545, 30, 812, { seed: SEED++, stroke: '#e8590c', strokeWidth: 1.8, roughness: 1, strokeLineDash: [7, 5] }));
  G.appendChild(rc.line(30, 812, 46, 812, { seed: SEED++, stroke: '#e8590c', strokeWidth: 1.8, roughness: 1 }));
  G.appendChild(rc.line(38, 807, 47, 812, { seed: SEED++, stroke: '#e8590c', strokeWidth: 1.8, roughness: 1 }));
  G.appendChild(rc.line(38, 817, 47, 812, { seed: SEED++, stroke: '#e8590c', strokeWidth: 1.8, roughness: 1 }));
  const rot = T(20, 690, 'AI SDK · model calls', 11, '#e8590c', 'middle');
  rot.setAttribute('transform', 'rotate(-90 20 690)');

  // ===== TIER 1 — Renderer =====
  band(50, 40, 900, 110, '#1971c2', '#a5d8ff');
  T(70, 68, '1 · Renderer', 17, '#1971c2', 'start');
  T(930, 66, 'React 19 · TanStack Router/Query · Zustand · Tailwind v4', 11, '#868e96', 'end');
  [['Chat', 169], ['Composer · Tiptap', 389], ['Settings', 609], ['Sidebar', 829]].forEach(([s, cx], i) => {
    chip(70 + i * 220, 84, 198, 54); T(cx, 118, s, 14);
  });

  // ===== TIER 2 — Transport =====
  band(50, 196, 900, 110, '#f08c00', '#ffec99');
  T(70, 224, '2 · Transport', 17, '#e8730c', 'start');
  T(930, 222, 'electron-trpc · Hono', 11, '#868e96', 'end');
  chip(70, 240, 419, 54); T(279, 264, 'tRPC over Electron IPC', 14); T(279, 283, 'CRUD · config · search · usage', 11, '#495057');
  chip(511, 240, 419, 54); T(720, 264, 'Hono HTTP · 127.0.0.1', 14); T(720, 283, 'chat SSE stream (resumable)', 11, '#495057');

  // ===== TIER 3 — Main process =====
  band(50, 352, 900, 230, '#2f9e44', '#b2f2bb');
  T(70, 380, '3 · Main Process', 17, '#2f9e44', 'start');
  T(930, 378, 'Node · Vercel AI SDK (streamText)', 11, '#868e96', 'end');
  chip(70, 388, 860, 40); T(84, 414, 'tRPC Routers', 13, '#1e1e1e', 'start');
  T(916, 414, 'threads · messages · providers · mcp · memory · skills · subagents · settings · usage · search', 10, '#495057', 'end');
  group(64, 442, 872, 128, '#2f9e44');
  T(84, 462, 'AI Agent Runtime', 11, '#2f9e44', 'start');
  [['Agent loop', 'streamText', 148], ['Middleware', 'chain', 323], ['Tools', 'file · bash · web', 498],
   ['Permissions', 'boundary gate', 673], ['Sandbox', 'fs · shell', 848]].forEach(([n, sub, cx], i) => {
    chip(70 + i * 175, 470, 157, 42); T(cx, 489, n, 12); T(cx, 504, sub, 9, '#495057');
  });
  ['MCP client', 'Skills', 'Subagents', 'Memory', 'Compaction', 'Providers'].forEach((n, i) => {
    chip(70 + i * 145, 520, 131, 42); T(70 + i * 145 + 65, 547, n, 12);
  });

  // ===== TIER 4 — Storage & security =====
  band(50, 628, 900, 110, '#9c36b5', '#eebefa');
  T(70, 656, '4 · Storage & Security', 17, '#9c36b5', 'start');
  T(930, 654, 'local-first · encrypted at rest', 11, '#868e96', 'end');
  chip(70, 672, 272, 54); T(206, 698, 'SQLite + FTS5', 14); T(206, 717, 'better-sqlite3 · Drizzle ORM', 11, '#495057');
  chip(364, 672, 272, 54); T(500, 698, 'App Settings', 14); T(500, 717, 'electron-conf', 11, '#495057');
  chip(658, 672, 272, 54); T(794, 698, 'OS Keychain', 14); T(794, 717, 'safeStorage-encrypted keys', 11, '#495057');

  // ===== TIER 5 — Model providers (external, dashed) =====
  band(50, 784, 900, 110, '#e8590c', '#ffc9c9', true);
  T(70, 812, '5 · Model Providers', 17, '#e8590c', 'start');
  T(930, 810, 'external · via your encrypted API keys', 11, '#868e96', 'end');
  chip(70, 828, 157, 54); T(148, 861, 'Anthropic', 13);
  chip(245, 828, 157, 54); T(323, 861, 'Google Gemini', 13);
  chip(420, 828, 157, 54); T(498, 855, 'OpenAI-', 13); T(498, 872, 'compatible', 13);
  chip(595, 828, 157, 54); T(673, 855, 'Ollama', 13); T(673, 872, 'local', 9, '#495057');
  chip(770, 828, 157, 54); T(848, 854, 'CLI agents', 13); T(848, 871, 'Claude Code · Codex · Gemini (ACP)', 8, '#495057');

  // ===== legend =====
  const leg = [['#1971c2', '#a5d8ff', 'UI'], ['#f08c00', '#ffec99', 'Transport'],
    ['#2f9e44', '#b2f2bb', 'Main / Agent'], ['#9c36b5', '#eebefa', 'Storage'],
    ['#e8590c', '#ffc9c9', 'External providers']];
  let lx = 70;
  leg.forEach(([st, fl, lb]) => {
    G.appendChild(rc.rectangle(lx, 922, 16, 16, { seed: SEED++, roughness: 1.4, strokeWidth: 1.4, stroke: st, fill: fl, fillStyle: 'hachure', hachureGap: 4 }));
    T(lx + 22, 935, lb, 11, '#495057', 'start');
    lx += 22 + 16 + lb.length * 7 + 24;
  });
</script>
</body>
</html>
