name: Release

# release-please watches Conventional Commits on main and maintains a "release
# PR" that bumps package.json + CHANGELOG.md. Merging that PR creates the tag +
# GitHub Release; this same run then builds installers for every OS and uploads
# them to that release. Run manually via "Run workflow" for a build-only dry run
# that doesn't publish.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build + publish only when release-please just cut a release, or on a manual
  # dry run (which builds without publishing). The release commit already passed
  # CI on the release PR, so there's no separate test gate here.
  release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build each macOS arch on its own native runner: macos-15 is
          # Apple Silicon (arm64), macos-15-intel is the last GitHub-hosted
          # Intel (x64) image (available through Aug 2027; the old macos-13
          # Intel runner was retired Dec 2025). Native runners rebuild
          # better-sqlite3 / node-pty for their own arch cleanly.
          - os: macos-15
            platform: mac
            archFlag: "--arm64"
            arch: arm64
          - os: macos-15-intel
            platform: mac
            archFlag: "--x64"
            arch: x64
          - os: windows-latest
            platform: win
            archFlag: ""
          - os: ubuntu-latest
            platform: linux
            archFlag: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      # postinstall runs electron-builder install-app-deps (rebuilds better-sqlite3
      # against this runner's Electron ABI) plus Electron's own binary download.
      # GitHub-hosted macOS/Windows runners intermittently 504 on that download,
      # so retry with backoff, wiping node_modules each time to force the
      # postinstall scripts to re-run.
      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if bun install --frozen-lockfile; then exit 0; fi
            echo "::warning::dependency install failed (attempt $attempt); retrying"
            rm -rf node_modules
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build renderer + main
        run: bun run build

      # Import the Developer ID cert into a keychain BEFORE packaging.
      # electron-builder imports CSC_LINK only during its own signing phase, which
      # runs *after* the afterPack hook — so without this, afterPack can't sign the
      # nested Computer Use helper on CI (it works locally only because the cert
      # already lives in the login keychain). No secret (fork) → skip cleanly.
      - name: Import Developer ID certificate
        if: matrix.platform == 'mac'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$MAC_CSC_LINK" ]; then
            echo "No signing certificate (fork build) — skipping."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/atrium-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          CERT="$RUNNER_TEMP/developer-id.p12"
          echo "$MAC_CSC_LINK" | base64 --decode > "$CERT"
          security import "$CERT" -k "$KEYCHAIN" -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the user search list (keeping the defaults) so
          # find-identity + codesign resolve the identity during afterPack.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT"
          security find-identity -v -p codesigning "$KEYCHAIN"

      # Compile the macOS Computer Use helper (swiftc) so it exists for
      # extraResources at package time. The Developer ID cert was imported above,
      # so build.sh signs it for real; the afterPack hook re-signs it (hardened +
      # timestamp) right before electron-builder seals + notarizes the app.
      - name: Build Computer Use helper
        if: matrix.platform == 'mac'
        run: bun run build:helper

      - name: Package and publish
        run: bunx electron-builder --${{ matrix.platform }} ${{ matrix.archFlag }} --publish ${{ needs.release-please.outputs.release_created == 'true' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. These are only populated on the mac
          # runner; Windows/Linux get empty strings, so electron-builder finds
          # no cert (CSC_LINK) and no notarize creds and skips both cleanly.
          # CSC_LINK is the base64 of the Developer ID Application .p12.
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}

      # electron-builder uploads the dmg the instant it's built — before the
      # afterAllArtifactBuild hook signs, notarizes, and staples it — so the
      # published dmg is the un-notarized copy and Gatekeeper blocks a download.
      # The hook still staples the local dmg, so re-upload that over the published
      # one. (The zip that feeds auto-update is unaffected: its app is notarized,
      # and it's never Gatekeeper-assessed as a container.)
      - name: Re-upload notarized dmg
        if: matrix.platform == 'mac' && needs.release-please.outputs.release_created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/*.dmg --clobber

      # Each mac runner writes a single-arch latest-mac.yml; stash both so
      # merge-mac-yml can combine them. electron-builder's --publish uploads one
      # too, but the two runners race and only the last survives — the merge job
      # overwrites it with a manifest that lists both arches.
      - name: Stash mac update manifest
        if: matrix.platform == 'mac' && needs.release-please.outputs.release_created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: mac-yml-${{ matrix.arch }}
          path: dist/latest-mac.yml
          if-no-files-found: error

  # Combine the two single-arch mac manifests into one listing both arches, then
  # overwrite latest-mac.yml on the Release so electron-updater serves Intel and
  # Apple Silicon the build that matches. Only runs for a real release cut.
  merge-mac-yml:
    needs: [release-please, release]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download per-arch mac manifests
        uses: actions/download-artifact@v8
        with:
          pattern: mac-yml-*
          path: mac-yml

      # Install only `yaml` (into a temp dir so the checkout stays clean) rather
      # than the whole app tree — the merge just parses two small files.
      - name: Merge manifests
        run: |
          mkdir -p /tmp/ym && (cd /tmp/ym && npm init -y >/dev/null 2>&1 && npm i yaml@^2 >/dev/null 2>&1)
          NODE_PATH=/tmp/ym/node_modules node scripts/merge-mac-yml.cjs \
            mac-yml/mac-yml-arm64/latest-mac.yml \
            mac-yml/mac-yml-x64/latest-mac.yml \
            latest-mac.yml

      - name: Upload merged manifest to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" latest-mac.yml --clobber
