name: Release

# Push a tag like v0.1.0 (matching package.json "version") to build installers on
# all three OSes and upload them to a GitHub Release (created as a draft by
# electron-builder — review it, then publish). Run manually via "Run workflow"
# for a build-only dry run that doesn't publish.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate packaging on a green lint + typecheck + test run.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build each macOS arch on its own native runner: macos-latest is
          # Apple Silicon (arm64), macos-13 is Intel (x64). Native runners
          # rebuild better-sqlite3 / node-pty for their own arch cleanly.
          - os: macos-latest
            platform: mac
            archFlag: "--arm64"
          - os: macos-13
            platform: mac
            archFlag: "--x64"
          - os: windows-latest
            platform: win
            archFlag: ""
          - os: ubuntu-latest
            platform: linux
            archFlag: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      # postinstall runs electron-builder install-app-deps (rebuilds better-sqlite3
      # against this runner's Electron ABI) plus Electron's own binary download.
      # GitHub-hosted macOS/Windows runners intermittently 504 on that download,
      # so retry with backoff, wiping node_modules each time to force the
      # postinstall scripts to re-run.
      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if bun install --frozen-lockfile; then exit 0; fi
            echo "::warning::dependency install failed (attempt $attempt); retrying"
            rm -rf node_modules
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build renderer + main
        run: bun run build

      - name: Package and publish
        run: bunx electron-builder --${{ matrix.platform }} ${{ matrix.archFlag }} --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. These are only populated on the mac
          # runner; Windows/Linux get empty strings, so electron-builder finds
          # no cert (CSC_LINK) and no notarize creds and skips both cleanly.
          # CSC_LINK is the base64 of the Developer ID Application .p12.
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
