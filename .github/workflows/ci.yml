name: CI

# Lint + typecheck + unit tests on every push to main and on PRs.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + typecheck
        run: bun run check

      - name: Unit tests
        run: bun test
