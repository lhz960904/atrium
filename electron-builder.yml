appId: com.atrium.app
productName: Atrium
publish:
  provider: github
  owner: lhz960904
  repo: atrium
  releaseType: release
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!design/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!drizzle.config.ts'
  - '!biome.json'
  - '!{.env,.env.*,.npmrc,bun.lockb,bun.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{README.md,CHANGELOG.md,dev-app-update.yml}'
extraResources:
  - from: drizzle/migrations
    to: drizzle/migrations
    filter:
      - '**/*'
  - from: skills
    to: skills
    filter:
      - '**/*'
asarUnpack:
  - resources/**
  # jieba-wasm reads its .wasm via fs.readFileSync(__dirname/...); unpack it so
  # the file resolves on disk rather than from inside the asar archive.
  - node_modules/jieba-wasm/**
# Re-sign the nested Computer Use helper (timestamped, hardened) after the app is
# signed and before notarization — electron-builder doesn't deep-sign extraResources.
afterSign: scripts/after-sign.cjs
mac:
  # Signed + notarized with a real Developer ID (Team 43PH2NJ5C4). Hardened
  # Runtime is mandatory for notarization, and it makes dyld enforce Library
  # Validation — every nested binary must share that Team ID, which a genuine
  # signature satisfies. The entitlements below grant the JIT /
  # unsigned-executable-memory / dyld-env exceptions Electron's V8 needs while
  # Hardened Runtime is on. Notarization credentials come from the environment
  # (APPLE_* / APPLE_KEYCHAIN_PROFILE); when none are present — Windows/Linux
  # runners, or a fork without secrets — electron-builder skips notarization
  # silently instead of failing.
  #
  # arm64 and x64 are each built on their own native CI runner (Apple Silicon
  # vs Intel), which sidesteps cross-compiling the native modules
  # (better-sqlite3, node-pty). dmg is the human download; zip feeds
  # electron-updater (Squirrel.Mac can't consume a dmg, and without a zip target
  # no latest-mac.yml is emitted at all). Each runner writes a single-arch
  # latest-mac.yml that would clobber the other's on publish, so a merge-mac-yml
  # job in release.yml combines the two into one manifest listing both arches.
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Atrium 需要访问相机以支持相关功能。
    - NSMicrophoneUsageDescription: Atrium 需要访问麦克风以支持语音输入。
    - NSDocumentsFolderUsageDescription: Atrium 需要访问"文稿"文件夹以读写工作区文件。
    - NSDownloadsFolderUsageDescription: Atrium 需要访问"下载"文件夹以保存生成的产物。
  notarize: true
  # The signed Computer Use helper ships inside Resources. It's macOS-only, so it
  # lives under mac.extraResources (appended to the common list) rather than the
  # top-level one — Windows/Linux builds never carry it. electron-builder won't
  # deep-sign nested extraResources, so the afterSign hook signs it (Team
  # 43PH2NJ5C4 + hardened runtime) before notarization.
  extraResources:
    - from: native/computer-use-helper/build/Atrium Computer Use.app
      to: Atrium Computer Use.app
      filter:
        - '**/*'
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
win:
  target:
    - nsis
  artifactName: ${name}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  category: Development
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
